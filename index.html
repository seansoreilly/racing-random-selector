<body class="min-h-screen bg-gradient-to-br from-secondary-50 to-secondary-100 font-racing text-secondary-900 antialiased">
    <!-- Main Application Container -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-8">
        <!-- Header Section -->
        <header class="animate-fade-in">
          <div class="header-image-container">
            <img src="/public/sprites/header.png" alt="Racing Random Selector" class="w-full block" />
            <div class="header-url-overlay">
              www.racingrandomselector.top
            </div>
          </div>
        </header>

        <!-- Main Content -->
        <main class="animate-slide-up">
            <!-- Responsive Layout: Mobile-first, then Desktop 3-column -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8 mb-8">
                <!-- Input Section - Left Column -->
                <div class="lg:col-span-1 space-y-6">
                    <!-- Participants Panel -->
                    <div class="panel-racing group">
                        <div class="bg-gradient-to-r from-secondary-50 to-white p-4 border-b border-secondary-200">
                            <h2 class="text-lg sm:text-xl font-bold text-secondary-800 flex items-center gap-3">
                                <i class="fas fa-user-friends text-primary-500 group-hover:scale-110 transition-transform duration-200"></i>
                                <span>Participants</span>
                                <span class="text-xs bg-primary-100 text-primary-700 px-2 py-1 rounded-full ml-auto">
                                    Enter Names
                                </span>
                            </h2>
                        </div>
                        <div class="p-4">
                            <textarea 
                                id="nameInput" 
                                placeholder="Enter participant names (one per line)&#10;&#10;Example:&#10;Lightning McQueen&#10;Speed Racer&#10;Fast & Furious"
                                class="racing-input min-h-[180px] sm:min-h-[200px] resize-none focus-racing">
                            </textarea>
                            <div class="mt-3 flex flex-wrap gap-2">
                                <button id="loadDemo" class="btn-outline text-xs px-3 py-1">
                                    <i class="fas fa-magic mr-1"></i>
                                    Load Demo
                                </button>
                                <button id="clearNames" class="btn-secondary text-xs px-3 py-1">
                                    <i class="fas fa-eraser mr-1"></i>
                                    Clear
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Race Settings Panel -->
                    <div class="panel-racing group">
                        <div class="bg-gradient-to-r from-secondary-50 to-white p-4 border-b border-secondary-200">
                            <h2 class="text-lg sm:text-xl font-bold text-secondary-800 flex items-center gap-3">
                                <i class="fas fa-sliders-h text-primary-500 group-hover:scale-110 transition-transform duration-200"></i>
                                <span>Race Settings</span>
                            </h2>
                        </div>
                        <div class="p-4 space-y-4">
                            <div class="space-y-3">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-medium text-secondary-700">Race Speed:</span>
                                    <span id="speedValue" class="text-primary-600 font-bold text-lg px-3 py-1 bg-primary-50 rounded-full">
                                        Slow
                                    </span>
                                </div>
                                <input type="range" id="speedControl" min="0" max="100" value="70" 
                                       class="w-full h-3 bg-secondary-200 rounded-lg appearance-none cursor-pointer slider-thumb focus-racing">
                                <div class="flex justify-between text-xs text-secondary-500 font-medium">
                                    <span class="flex items-center">
                                        <i class="fas fa-turtle mr-1"></i>
                                        Slower
                                    </span>
                                    <span class="flex items-center">
                                        <i class="fas fa-rocket mr-1"></i>
                                        Faster
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Race Section - Right Column (spans 2 columns on large screens) -->
                <div class="lg:col-span-2">
                    <div class="panel-racing h-full flex flex-col min-h-[500px]">
                        <div class="bg-gradient-to-r from-secondary-50 to-white p-4 border-b border-secondary-200 flex-shrink-0">
                            <h2 class="text-lg sm:text-xl font-bold text-secondary-800 flex items-center gap-3">
                                <i class="fas fa-trophy text-racing-yellow animate-pulse"></i>
                                <span>Race Track</span>
                                <div class="ml-auto flex items-center gap-2">
                                    <span class="hidden sm:inline text-xs bg-racing-yellow bg-opacity-20 text-racing-black px-2 py-1 rounded-full">
                                        <i class="fas fa-flag-checkered mr-1"></i>
                                        Ready to Race
                                    </span>
                                </div>
                            </h2>
                        </div>
                        <div class="p-4 flex-grow flex flex-col">
                            <div id="raceTrackContainer" class="race-track relative">
                                <div class="finish-line"></div>
                                <div id="raceLanes" class="space-y-2 p-4"></div>
                                <div id="countdownOverlay" class="absolute inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden backdrop-blur-sm">
                                    <div class="countdown-display"></div>
                                </div>
                            </div>
                            <div id="winner" class="mt-4 p-4 bg-gradient-to-r from-racing-yellow to-accent-400 rounded-lg text-center font-bold text-lg text-racing-black hidden winner-celebration">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap justify-center items-center gap-4 animate-bounce-in mb-8">
                <button id="resetRace" class="btn-secondary text-sm px-4 py-2">
                    <i class="fas fa-redo mr-2"></i>
                    Reset Race
                </button>
                <button id="startRace" class="btn-racing text-lg sm:text-xl px-6 sm:px-8 py-3 sm:py-4 shadow-2xl">
                    <i class="fas fa-flag-checkered mr-2 sm:mr-3"></i>
                    <span>Start Race</span>
                    <i class="fas fa-bolt ml-2 sm:ml-3 animate-pulse"></i>
                </button>
                <button id="newRace" class="btn-success text-sm px-4 py-2">
                    <i class="fas fa-plus mr-2"></i>
                    New Race
                </button>
            </div>

            <!-- Results Section -->
            <div class="panel-racing animate-fade-in">
                <div class="bg-gradient-to-r from-secondary-50 to-white p-4 border-b border-secondary-200 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                    <h2 class="text-lg sm:text-xl font-bold text-secondary-800 flex items-center gap-3">
                        <i class="fas fa-history text-primary-500"></i>
                        <span>Race History</span>
                        <span id="historyCount" class="text-xs bg-secondary-100 text-secondary-600 px-2 py-1 rounded-full">
                            0 races
                        </span>
                    </h2>
                    <div class="flex gap-2">
                        <button id="exportHistory" class="btn-outline text-xs px-3 py-1">
                            <i class="fas fa-download mr-1"></i>
                            Export
                        </button>
                        <button id="clearHistory" class="btn-danger text-xs px-3 py-1">
                            <i class="fas fa-trash mr-1"></i>
                            Clear
                        </button>
                    </div>
                </div>
                <div class="p-4">
                    <div id="resultsContainer" class="space-y-3 max-h-64 overflow-y-auto custom-scrollbar">
                        <div class="text-center text-secondary-400 py-8">
                            <i class="fas fa-trophy text-4xl mb-3 opacity-50"></i>
                            <p class="text-sm">No races completed yet. Start your first race!</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="text-center text-secondary-500 text-sm py-4 border-t border-secondary-200">
            <div class="space-y-2">
                <p>
                    <i class="fas fa-heart text-red-500 animate-pulse"></i>
                    Made with passion for fair and fun selections
                </p>
                <script src="script.js"></script>
            </div>
        </footer>
    </div>

</body>
</html>
